version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - [%(filename)s:%(lineno)d] - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  simple:
    format: '%(levelname)s - %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/automic_monitor.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/automic_monitor_error.log
    maxBytes: 5242880  # 5MB
    backupCount: 3

loggers:
  src:
    level: DEBUG
    handlers:
      - console
      - file
    propagate: false
  
  src.automic:
    level: DEBUG
    handlers:
      - console
      - file
    propagate: false
  
  src.processors:
    level: DEBUG
    handlers:
      - console
      - file
    propagate: false
  
  src.database:
    level: DEBUG
    handlers:
      - console
      - file
      - error_file
    propagate: false
  
  src.utils:
    level: DEBUG
    handlers:
      - console
      - file
    propagate: false

root:
  level: DEBUG
  handlers:
    - console
    - file
    - error_file
